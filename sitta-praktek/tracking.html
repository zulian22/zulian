<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light header-sitta">
        <div class="container-fluid py-2">
            <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
                <img src="assets/logo-ut.png" alt="Logo UT" class="logo-nav me-2">
                <span class="fw-bold text-white fs-5">Dashboard SITTA</span>
            </a>
            
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link text-white mx-3" href="stok.html">Informasi Bahan Ajar</a></li>
                    <li class="nav-item"><a class="nav-link nav-active text-white mx-3" href="tracking.html">Tracking Pengiriman</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle text-white mx-3" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            Laporan
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Monitoring Progress DO Bahan Ajar</a></li>
                            <li><a class="dropdown-item" href="#">Rekap Bahan Ajar</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a class="nav-link text-white mx-3" href="#">Histori Transaksi Bahan Ajar</a></li>
                </ul>
            </div>
            
            <button class="btn btn-keluar" id="logoutBtn">Keluar</button>
        </div>
    </nav>
    
    <hr class="divider-sitta">

    <div class="container my-4">
        <div class="tracking-card p-4 p-md-5 bg-white border shadow-sm">
            
            <h2 class="mb-4 text-primary">Tracking Bahan Ajar</h2>
            
            <form id="trackingForm" class="row g-3 align-items-center mb-5">
                <div class="col-md-5">
                    <label for="nomorDO" class="form-label mb-0">Nomor Delivery Order</label>
                    <input type="text" class="form-control" id="nomorDO" placeholder="Masukan Nomor DO" required>
                </div>
                <div class="col-md-2 d-grid">
                    <button type="submit" class="btn btn-primary mt-4">Lacak</button>
                </div>
            </form>

            <div id="trackingResult" class="mt-4">
                <div class="alert alert-info text-center" role="alert">
                    Masukkan Nomor Delivery Order untuk melacak pengiriman.
                </div>
            </div>

        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
