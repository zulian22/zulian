<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITTA - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="login-card p-4 p-md-5 border bg-white shadow-sm">
            <div class="text-center mb-4">
                <img src="assets/logo-ut.png" alt="Logo Universitas Terbuka" class="logo mb-2">
                <p class="small text-muted mb-0">UNIVERSITAS TERBUKA</p>
                <h1 class="h2 fw-bold text-primary mt-2 mb-4">SITTA</h1>
                <p class="h5">Pemesanan Bahan Ajar Universitas Terbuka</p>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="ut.ac.id" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="******" required>
                </div>
                
                <div id="loginAlert" class="alert alert-danger d-none" role="alert">
                    Email atau password salah.
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-lg mb-3">Masuk</button>
            </form>

            <div class="d-flex justify-content-between mt-3">
                <a href="#" class="text-decoration-none text-primary" data-bs-toggle="modal" data-bs-target="#adminContactModal">Lupa password?</a>
                <a href="#" class="text-decoration-none text-primary" data-bs-toggle="modal" data-bs-target="#adminContactModal">Belum punya akun?</a>
            </div>
        </div>
    </div>
<div class="modal fade" id="adminContactModal" tabindex="-1" aria-labelledby="adminContactModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title text-primary" id="adminContactModalLabel">
                    <i class="fas fa-exclamation-triangle me-2 text-warning"></i> Pemberitahuan
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p>
                    Fitur ini saat ini belum tersedia.
                </p>
                <p>
                    Untuk permintaan Lupa Password atau Daftar, 
                    silakan hubungi Administrator SITTA
                </p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/data.js"></script>
<script src="js/script.js"></script>
</body>
</html>
